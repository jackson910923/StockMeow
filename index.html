<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#27406b">
<title>我的持股</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我的持股">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="wrap">
      <div class="bar">
        <h1>我的持股</h1>
        <button class="gear" id="openSettings" title="設定" aria-label="設定">⚙️</button>
      </div>
      <div class="updated" id="updated"></div>
      <span class="sample-badge" id="sample" hidden>範例假資料</span>
    </div>
  </header>

  <div class="wrap">
    <section class="summary" id="summary" hidden></section>
    <main id="cards"></main>
    <section id="allocation" hidden></section>
    <h2 class="sec-title" id="hotTitle" hidden>🔥 今日熱門（成交量前 10）</h2>
    <main id="hotCards" class="hot-grid"></main>
    <footer class="disclaimer">
      本頁所有數字與「參考」傾向僅供參考，<b>不是投資建議</b>，請自行判斷、風險自負。<br>
      資料來源：FinMind、證交所、CMoney 股市同學會（公開資料）。
    </footer>
  </div>

  <!-- 設定（底部抽屜） -->
  <div class="overlay" id="settings" hidden>
    <div class="sheet">
      <div class="sheet-head">
        <h2>設定</h2>
        <button class="x" id="closeSettings" aria-label="關閉">✕</button>
      </div>

      <section>
        <h3>我的持股</h3>
        <div id="holdingList"></div>
        <div class="add-row">
          <input id="addCode" list="stockList" placeholder="代號或名字（例：2330 或 台積電）" aria-label="股票代號" autocomplete="off">
          <input id="addShares" type="number" min="0" step="1" placeholder="張數" aria-label="張數">
          <input id="addCost" type="number" min="0" step="0.01" placeholder="成本/股" aria-label="成本">
          <button class="primary" id="addBtn">新增</button>
        </div>
        <datalist id="stockList"></datalist>
        <div class="hint">任何上市櫃股票都能加（打代號或名字搜尋）。持股只存在這台裝置的瀏覽器，不會上傳、不會進 GitHub。</div>
      </section>

      <section>
        <h3>顯示方式</h3>
        <div class="field">
          <label for="colorMode">漲跌顏色</label>
          <select id="colorMode">
            <option value="tw">台股習慣：漲紅、跌綠</option>
            <option value="intl">歐美習慣：漲綠、跌紅</option>
          </select>
        </div>
        <div class="field">
          <label for="unit">金額單位</label>
          <select id="unit">
            <option value="wan">用「萬」顯示</option>
            <option value="yuan">用「元」顯示</option>
          </select>
        </div>
      </section>

      <section>
        <button class="danger" id="resetBtn">清除所有設定與持股</button>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
