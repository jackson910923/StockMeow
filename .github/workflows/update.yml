name: 每日更新儀表板資料

on:
  schedule:
    # UTC 09:30＝台灣 17:30（收盤後）。週一～週五跑。
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}        # 也能在 Actions 頁面手動按一下觸發
  push:                        # 改到 build 程式就自動跑一次（順便當 CI 驗證）
    branches: [main]
    paths:
      - "builder/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write              # 讓 Action 能 push 更新後的 data.json

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install -r builder/requirements.txt

      - name: 安裝瀏覽器（同學會情緒分析用）
        run: python -m playwright install --with-deps chromium

      - name: 產生 data.json / names.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python builder/build.py

      - name: 有變更才 commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json names.json builder/watchlist.txt
          git add -A builder/requests
          if git diff --cached --quiet; then
            echo "資料沒有變化，跳過。"
          else
            git commit -m "自動更新資料 $(date -u +%Y-%m-%d)"
            git push
          fi
